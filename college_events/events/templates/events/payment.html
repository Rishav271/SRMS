{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow-lg p-4 col-md-6 mx-auto">

        <h2 class="text-center mb-4">💳 Card Payment</h2>

        <p><strong>Event:</strong> {{ event.title }}</p>
        <p><strong>Amount:</strong> ₹{{ event.price }}</p>

        <form method="POST" action="{% url 'events:process_payment' event.id %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Card Holder Name</label>
                <input type="text" name="card_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Card Number</label>
                <input type="text" name="card_number" class="form-control" maxlength="16" placeholder="1234 5678 9012 3456" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Expiry Date</label>
                    <input type="month" name="expiry" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">CVV</label>
                    <input type="password" name="cvv" class="form-control" maxlength="3" required>
                </div>
            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-success px-4">
                    Pay ₹{{ event.price }}
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
