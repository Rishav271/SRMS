<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Event Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'events:home' %}">Event Manager</a>
      <div>
        {% if user.is_authenticated %}
          <span class="text-white me-3">Hi, {{ user.username }}</span>
          {% if user.is_authenticated %}
    <a href="{% url 'events:my_registrations' %}" class="btn btn-info btn-sm me-2">My Events</a>
{% endif %}
          <a href="{% url 'events:logout' %}" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
          <a href="{% url 'events:login' %}" class="btn btn-light btn-sm me-2">Login</a>
          <a href="{% url 'events:register' %}" class="btn btn-primary btn-sm">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
